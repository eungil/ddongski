<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>똥스키 — 프로필 편집</title>
  <link rel="stylesheet" href="wireframe.css">
</head>
<body>
  <p class="screen-label">설정 하위 — 반려견 프로필 편집</p>
  <div class="phone">
    <div class="status-bar"><span>9:41</span><span>●●●</span></div>
    <div class="screen">
      <!-- 헤더 -->
      <div style="display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #F0F0F0;gap:12px;flex-shrink:0">
        <div style="font-size:20px;color:#999">‹</div>
        <div style="font-size:17px;font-weight:700;color:#1A1A1A;flex:1">프로필 편집</div>
        <div style="font-size:15px;font-weight:600;color:#333">저장</div>
      </div>

      <div style="flex:1;overflow-y:auto;padding:20px 16px 32px;display:flex;flex-direction:column;gap:20px">

        <!-- 기본 정보 -->
        <div>
          <div style="font-size:11px;font-weight:700;color:#999;letter-spacing:0.08em;margin-bottom:10px">기본 정보</div>
          <div style="display:flex;flex-direction:column;gap:10px">
            <div>
              <div class="section-label">이름</div>
              <div class="input-field">코코</div>
            </div>
            <div>
              <div class="section-label">견종</div>
              <div class="input-field">포메라니안</div>
            </div>
            <div>
              <div class="section-label">나이</div>
              <div class="chip-group" style="margin-bottom:0">
                <div class="chip">~12주</div>
                <div class="chip">12주~6개월</div>
                <div class="chip">6개월~1세</div>
                <div class="chip selected">1~7세</div>
                <div class="chip">7세 이상</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 체형 -->
        <div>
          <div style="font-size:11px;font-weight:700;color:#999;letter-spacing:0.08em;margin-bottom:10px">체형</div>
          <div style="display:flex;gap:8px;margin-bottom:10px">
            <div class="chip selected" style="flex:1;justify-content:center;display:flex">소형</div>
            <div class="chip" style="flex:1;justify-content:center;display:flex">중형</div>
            <div class="chip" style="flex:1;justify-content:center;display:flex">대형</div>
          </div>
          <div class="section-label">체중 (kg)</div>
          <div style="display:flex;align-items:center;gap:12px">
            <div class="input-field" style="flex:1;margin-bottom:0">3.5</div>
            <div style="font-size:16px;color:#999;font-weight:600">kg</div>
          </div>
        </div>

        <!-- 중성화 -->
        <div>
          <div style="font-size:11px;font-weight:700;color:#999;letter-spacing:0.08em;margin-bottom:10px">중성화 여부</div>
          <div style="display:flex;gap:8px">
            <div class="chip selected" style="flex:1;justify-content:center;display:flex">✂️ 했어요</div>
            <div class="chip" style="flex:1;justify-content:center;display:flex">🐾 안 했어요</div>
            <div class="chip" style="flex:1;justify-content:center;display:flex;color:#BDBDBD">모르겠어요</div>
          </div>
        </div>

        <!-- 베이스라인 -->
        <div>
          <div style="font-size:11px;font-weight:700;color:#999;letter-spacing:0.08em;margin-bottom:10px">베이스라인 (경고 기준)</div>
          <div style="border:1.5px solid #E0E0E0;border-radius:14px;overflow:hidden">
            <div style="display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #F0F0F0">
              <div style="font-size:13px;color:#555;flex:1">평소 색깔</div>
              <div style="font-size:13px;color:#333;font-weight:600">🟤 갈색</div>
              <div style="font-size:13px;color:#C0C0C0;margin-left:8px">›</div>
            </div>
            <div style="display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #F0F0F0">
              <div style="font-size:13px;color:#555;flex:1">평소 형태</div>
              <div style="font-size:13px;color:#333;font-weight:600">🌭 단계 2</div>
              <div style="font-size:13px;color:#C0C0C0;margin-left:8px">›</div>
            </div>
            <div style="display:flex;align-items:center;padding:14px 16px">
              <div style="font-size:13px;color:#555;flex:1">평소 횟수</div>
              <div style="font-size:13px;color:#333;font-weight:600">2회/일</div>
              <div style="font-size:13px;color:#C0C0C0;margin-left:8px">›</div>
            </div>
          </div>
        </div>

        <!-- 삭제 -->
        <div style="padding-top:4px">
          <div style="text-align:center;font-size:14px;color:#FF5959;font-weight:600;padding:12px">
            코코 삭제
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="nav">
    <a href="index.html" class="home">목차</a>
    <a href="08-record.html">기록</a>
    <a href="09-status.html">현황</a>
    <a href="10-settings.html">설정</a>
    <a href="11-poop-guide.html">가이드</a>
    <a href="12-notification-time.html">알림</a>
    <a href="13-report.html">리포트</a>
    <a href="14-profile-edit.html" class="current">프로필편집</a>
  </div>
</body>
</html>
