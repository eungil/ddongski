<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>똥스키 — 알림 시간 설정</title>
  <link rel="stylesheet" href="wireframe.css">
  <style>
    .drum-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    .drum-item {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 500;
      color: #BDBDBD;
      width: 100%;
    }
    .drum-item.selected {
      color: #1A1A1A;
      font-size: 24px;
      font-weight: 700;
    }
    .drum-highlight {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      height: 48px;
      background: #F5F5F5;
      border-top: 1.5px solid #E0E0E0;
      border-bottom: 1.5px solid #E0E0E0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <p class="screen-label">설정 하위 — 알림 시간 설정</p>
  <div class="phone">
    <div class="status-bar"><span>9:41</span><span>●●●</span></div>
    <div class="screen">
      <!-- 헤더 -->
      <div style="display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #F0F0F0;gap:12px;flex-shrink:0">
        <div style="font-size:20px;color:#999">‹</div>
        <div style="font-size:17px;font-weight:700;color:#1A1A1A;flex:1">알림 설정</div>
        <div style="font-size:15px;font-weight:600;color:#333">저장</div>
      </div>

      <div style="flex:1;padding:24px 16px;display:flex;flex-direction:column;gap:24px">

        <!-- 알림 on/off -->
        <div style="display:flex;align-items:center;padding:16px;border:1.5px solid #E0E0E0;border-radius:14px;background:#FAFAFA">
          <div style="flex:1">
            <div style="font-size:15px;font-weight:600;color:#1A1A1A">푸시 알림</div>
            <div style="font-size:12px;color:#999;margin-top:2px">매일 설정 시간에 알림을 보내요</div>
          </div>
          <div class="toggle on"><div class="toggle-thumb"></div></div>
        </div>

        <!-- 드럼롤 시간 피커 -->
        <div>
          <div style="font-size:11px;font-weight:700;color:#999;letter-spacing:0.08em;margin-bottom:12px">알림 시간</div>
          <div style="border:1.5px solid #E0E0E0;border-radius:16px;overflow:hidden;background:#fff">
            <!-- 오전/오후 + 시 + 분 -->
            <div style="display:flex;height:240px;position:relative;padding:0 8px">
              <!-- 오전/오후 -->
              <div class="drum-col">
                <div class="drum-highlight"></div>
                <div class="drum-item" style="margin-top:48px">오전</div>
                <div class="drum-item">오전</div>
                <div class="drum-item selected">오후</div>
                <div class="drum-item">오후</div>
                <div class="drum-item">오후</div>
              </div>
              <!-- 시 -->
              <div class="drum-col">
                <div class="drum-highlight"></div>
                <div class="drum-item" style="margin-top:48px">7</div>
                <div class="drum-item">8</div>
                <div class="drum-item selected">9</div>
                <div class="drum-item">10</div>
                <div class="drum-item">11</div>
              </div>
              <!-- 분 -->
              <div class="drum-col">
                <div class="drum-highlight"></div>
                <div class="drum-item" style="margin-top:48px">45</div>
                <div class="drum-item">50</div>
                <div class="drum-item selected">00</div>
                <div class="drum-item">05</div>
                <div class="drum-item">10</div>
              </div>
            </div>
            <div style="padding:12px 16px;border-top:1px solid #F0F0F0;font-size:12px;color:#BDBDBD;text-align:center">
              위아래로 스크롤해서 시간을 설정하세요
            </div>
          </div>
        </div>

        <!-- 선택된 시간 프리뷰 -->
        <div style="background:#F5F5F5;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:10px">
          <span style="font-size:20px">🔔</span>
          <div>
            <div style="font-size:13px;color:#555">매일 <strong style="color:#1A1A1A">오후 9:00</strong>에 알림을 보내드려요</div>
            <div style="font-size:11px;color:#BDBDBD;margin-top:2px">"오늘 코코가 볼일을 봤나요?"</div>
          </div>
        </div>
      </div>

      <div style="padding:0 16px 32px;flex-shrink:0">
        <div class="btn-primary">저장</div>
      </div>
    </div>
  </div>
  <div class="nav">
    <a href="index.html" class="home">목차</a>
    <a href="08-record.html">기록</a>
    <a href="09-status.html">현황</a>
    <a href="10-settings.html">설정</a>
    <a href="11-poop-guide.html">가이드</a>
    <a href="12-notification-time.html" class="current">알림</a>
    <a href="13-report.html">리포트</a>
    <a href="14-profile-edit.html">프로필편집</a>
  </div>
</body>
</html>
