<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>똥스키 — 설정 탭</title>
  <link rel="stylesheet" href="wireframe.css">
</head>
<body>
  <p class="screen-label">메인 — 설정 탭</p>
  <div class="phone">
    <div class="status-bar"><span>9:41</span><span>●●●</span></div>
    <div class="screen">
      <!-- 강아지 전환 바 -->
      <div class="dog-bar">
        <div class="dog-avatar selected">🐩</div>
        <div class="dog-avatar">🐕</div>
        <div class="dog-add">+</div>
      </div>

      <div style="flex:1;overflow-y:auto;padding-bottom:16px">
        <!-- 반려견 프로필 -->
        <div class="settings-section">
          <div class="settings-title">반려견 프로필</div>
          <div class="settings-card">
            <div class="settings-row">
              <div class="settings-row-icon">🐩</div>
              <div>
                <div class="settings-row-label">코코</div>
                <div style="font-size:12px;color:#BDBDBD">포메라니안 · 성견 · 소형</div>
              </div>
              <div class="settings-row-arrow">›</div>
            </div>
            <div class="settings-row">
              <div class="settings-row-icon">🐕</div>
              <div>
                <div class="settings-row-label">망고</div>
                <div style="font-size:12px;color:#BDBDBD">골든리트리버 · 성견 · 대형</div>
              </div>
              <div class="settings-row-arrow">›</div>
            </div>
            <div class="settings-row">
              <div class="settings-row-icon" style="color:#BDBDBD">＋</div>
              <div class="settings-row-label" style="color:#BDBDBD">반려견 추가</div>
            </div>
          </div>
        </div>

        <!-- 알림 설정 -->
        <div class="settings-section">
          <div class="settings-title">알림 설정</div>
          <div class="settings-card">
            <div class="settings-row">
              <div class="settings-row-icon">🔔</div>
              <div class="settings-row-label">푸시 알림</div>
              <div class="toggle on"><div class="toggle-thumb"></div></div>
            </div>
            <div class="settings-row">
              <div class="settings-row-icon">🕘</div>
              <div class="settings-row-label">알림 시간</div>
              <div class="settings-row-value">오후 9:00</div>
              <div class="settings-row-arrow">›</div>
            </div>
          </div>
        </div>

        <!-- 정보 및 도구 -->
        <div class="settings-section">
          <div class="settings-title">정보 및 도구</div>
          <div class="settings-card">
            <div class="settings-row">
              <div class="settings-row-icon">📖</div>
              <div class="settings-row-label">배변 가이드</div>
              <div class="settings-row-arrow">›</div>
            </div>
            <div class="settings-row">
              <div class="settings-row-icon">📄</div>
              <div class="settings-row-label">리포트 내보내기</div>
              <div class="settings-row-arrow">›</div>
            </div>
            <div class="settings-row">
              <div class="settings-row-icon">💬</div>
              <div class="settings-row-label">피드백 보내기</div>
              <div class="settings-row-arrow">›</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 탭바 -->
    <div class="tab-bar">
      <div class="tab-item">
        <div class="tab-icon">📝</div>
        <div>기록</div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">📊</div>
        <div>현황</div>
      </div>
      <div class="tab-item active">
        <div class="tab-icon">⚙️</div>
        <div>설정</div>
      </div>
    </div>
  </div>
  <div class="nav">
    <a href="index.html" class="home">목차</a>
    <a href="01-onboarding-1.html">1</a>
    <a href="02-onboarding-2.html">2</a>
    <a href="03-onboarding-3.html">3</a>
    <a href="04-onboarding-4.html">4</a>
    <a href="05-onboarding-5.html">5</a>
    <a href="06-onboarding-6.html">6</a>
    <a href="07-onboarding-7.html">7</a>
    <a href="08-record.html">기록</a>
    <a href="09-status.html">현황</a>
    <a href="10-settings.html" class="current">설정</a>
  </div>
</body>
</html>
