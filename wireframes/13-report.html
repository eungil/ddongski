<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>똥스키 — 리포트 내보내기</title>
  <link rel="stylesheet" href="wireframe.css">
</head>
<body>
  <p class="screen-label">설정 하위 — 리포트 내보내기</p>
  <div class="phone">
    <div class="status-bar"><span>9:41</span><span>●●●</span></div>
    <div class="screen">
      <!-- 헤더 -->
      <div style="display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #F0F0F0;gap:12px;flex-shrink:0">
        <div style="font-size:20px;color:#999">‹</div>
        <div style="font-size:17px;font-weight:700;color:#1A1A1A">리포트 내보내기</div>
      </div>

      <div style="flex:1;overflow-y:auto;padding:20px 16px 32px;display:flex;flex-direction:column;gap:20px">

        <!-- 강아지 선택 -->
        <div>
          <div style="font-size:11px;font-weight:700;color:#999;letter-spacing:0.08em;margin-bottom:10px">대상 반려견</div>
          <div style="display:flex;gap:8px">
            <div class="chip selected" style="display:flex;align-items:center;gap:6px;padding:10px 14px">
              <span>🐩</span> 코코
            </div>
            <div class="chip" style="display:flex;align-items:center;gap:6px;padding:10px 14px">
              <span>🐕</span> 망고
            </div>
          </div>
        </div>

        <!-- 기간 선택 -->
        <div>
          <div style="font-size:11px;font-weight:700;color:#999;letter-spacing:0.08em;margin-bottom:10px">기간</div>
          <div style="display:flex;gap:8px">
            <div class="chip" style="flex:1;justify-content:center;display:flex">7일</div>
            <div class="chip selected" style="flex:1;justify-content:center;display:flex">30일</div>
            <div class="chip" style="flex:1;justify-content:center;display:flex">전체</div>
          </div>
        </div>

        <!-- 리포트 미리보기 -->
        <div>
          <div style="font-size:11px;font-weight:700;color:#999;letter-spacing:0.08em;margin-bottom:10px">미리보기</div>
          <div style="border:1.5px solid #E0E0E0;border-radius:14px;overflow:hidden;background:#FAFAFA">
            <!-- 리포트 헤더 -->
            <div style="background:#333;color:#fff;padding:14px 16px">
              <div style="font-size:13px;font-weight:700">코코 배변 리포트</div>
              <div style="font-size:11px;opacity:0.6;margin-top:2px">2026.05.02 — 2026.06.01 (30일)</div>
            </div>
            <!-- 요약 -->
            <div style="padding:14px 16px;display:flex;gap:12px;border-bottom:1px solid #EFEFEF">
              <div style="flex:1;text-align:center">
                <div style="font-size:20px;font-weight:800;color:#1A1A1A">52</div>
                <div style="font-size:10px;color:#999">총 기록</div>
              </div>
              <div style="flex:1;text-align:center">
                <div style="font-size:20px;font-weight:800;color:#52C97D">45</div>
                <div style="font-size:10px;color:#999">정상</div>
              </div>
              <div style="flex:1;text-align:center">
                <div style="font-size:20px;font-weight:800;color:#FFB347">5</div>
                <div style="font-size:10px;color:#999">주의</div>
              </div>
              <div style="flex:1;text-align:center">
                <div style="font-size:20px;font-weight:800;color:#FF5959">2</div>
                <div style="font-size:10px;color:#999">경고</div>
              </div>
            </div>
            <!-- 그래프 축소판 -->
            <div style="padding:12px 16px;border-bottom:1px solid #EFEFEF">
              <div style="font-size:10px;color:#999;margin-bottom:8px">배변 빈도 추이</div>
              <div style="height:36px;background:#F0F0F0;border-radius:6px;display:flex;align-items:flex-end;padding:4px;gap:2px">
                <div style="flex:1;background:#52C97D;border-radius:3px;height:70%"></div>
                <div style="flex:1;background:#52C97D;border-radius:3px;height:80%"></div>
                <div style="flex:1;background:#FFB347;border-radius:3px;height:50%"></div>
                <div style="flex:1;background:#52C97D;border-radius:3px;height:90%"></div>
                <div style="flex:1;background:#FF5959;border-radius:3px;height:30%"></div>
                <div style="flex:1;background:#52C97D;border-radius:3px;height:80%"></div>
                <div style="flex:1;background:#52C97D;border-radius:3px;height:70%"></div>
              </div>
            </div>
            <!-- 이상 기록 -->
            <div style="padding:12px 16px">
              <div style="font-size:10px;color:#FF5959;font-weight:700;margin-bottom:6px">⚠️ 이상 기록 하이라이트</div>
              <div style="font-size:11px;color:#555;line-height:1.8">
                · 05.14 · 빨간 점액 코팅<br>
                · 05.22 · 흰색 변 1회
              </div>
            </div>
          </div>
        </div>

        <!-- 공유 버튼 -->
        <div style="display:flex;flex-direction:column;gap:10px">
          <div class="btn-primary" style="display:flex;align-items:center;justify-content:center;gap:8px">
            <span>📄</span> PDF로 저장
          </div>
          <div class="btn-primary" style="background:#F0F0F0;color:#333;display:flex;align-items:center;justify-content:center;gap:8px">
            <span>🖼️</span> 이미지로 공유
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="nav">
    <a href="index.html" class="home">목차</a>
    <a href="08-record.html">기록</a>
    <a href="09-status.html">현황</a>
    <a href="10-settings.html">설정</a>
    <a href="11-poop-guide.html">가이드</a>
    <a href="12-notification-time.html">알림</a>
    <a href="13-report.html" class="current">리포트</a>
    <a href="14-profile-edit.html">프로필편집</a>
  </div>
</body>
</html>
